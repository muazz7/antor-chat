<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
  <meta name="description" content="Antor — Secure private chat">
  <title>Antor — Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-ambient"></div>

  <!-- Auth Gate -->
  <div id="authGate" class="chat-auth-page">
    <div class="chat-auth-container">
      <div class="login-brand">
        <div class="logo">Antor</div>
        <div class="tagline">Private Communications</div>
      </div>

      <div class="chat-auth-card glass-card-elevated">
        <div class="chat-room-label">
          <span class="dot"></span>
          <span id="roomLabel">Loading...</span>
        </div>
        <h2>Enter Chat Room</h2>
        <p class="subtitle">Enter your credentials to join this conversation</p>
        <div id="chatAuthError" class="login-error">Invalid credentials</div>
        <form id="chatAuthForm" class="chat-auth-form" autocomplete="off">
          <div class="input-group">
            <label for="chatDisplayName">Your Name</label>
            <input type="text" id="chatDisplayName" class="input-field" placeholder="Enter your display name" autocomplete="off" required>
          </div>
          <div class="input-group">
            <label for="chatUserId">User ID</label>
            <input type="text" id="chatUserId" class="input-field" placeholder="Enter user ID" autocomplete="off" required>
          </div>
          <div class="input-group">
            <label for="chatPassword">Password</label>
            <input type="password" id="chatPassword" class="input-field" placeholder="Enter password" autocomplete="off" required>
          </div>
          <button type="submit" id="chatAuthBtn" class="btn btn-primary">
            Join Chat
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Chat Interface (hidden initially) -->
  <div id="chatInterface" class="chat-page" style="display: none;">
    <!-- Header -->
    <header class="chat-header">
      <div class="chat-header-info">
        <div class="room-icon">◈</div>
        <div>
          <h2 id="chatRoomName">Room</h2>
          <div class="status">
            <span class="online-dot"></span>
            <span id="chatStatus">Connected</span>
          </div>
        </div>
      </div>
      <button id="leaveChatBtn" class="btn btn-secondary btn-sm">Leave</button>
    </header>

    <!-- Messages -->
    <div id="chatMessages" class="chat-messages">
      <!-- Typing Indicator (inside messages so it scrolls with them) -->
      <div id="typingIndicator" class="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input
          type="text"
          id="messageInput"
          class="input-field"
          placeholder="Type a message..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          data-form-type="other"
          enterkeyhint="send"
        >
        <button id="sendBtn" class="chat-send-btn">
          ↑
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
